name: Premiere MCP CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  premiere-mcp-check:
    name: Premiere MCP Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff critical checks
        run: |
          ruff check --select E9,F821,F822,F823 \
            apps/premiere/adobe-mcp/adobe_mcp

      - name: Compile active Premiere MCP Python
        run: |
          python -m compileall -q apps/premiere/adobe-mcp/adobe_mcp
